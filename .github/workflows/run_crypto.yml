name: Crypto Bot (Every 4 Hours)

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours, 24/7
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "ALPACA_API_KEY=${{ secrets.ALPACA_API_KEY }}" >> .env
          echo "ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}" >> .env
          echo "ALPACA_PAPER=true" >> .env

      - name: Run crypto strategy comparison
        run: python scripts/run_crypto_strategies.py

      - name: Run crypto bot
        run: python scripts/run_crypto_bot.py

      - name: Generate dashboard
        run: python scripts/dashboard.py --no-browser

      - name: Commit and push results
        run: |
          git config user.name "SwingBot"
          git config user.email "swingbot@users.noreply.github.com"
          git add logs/crypto/ logs/crypto_strategies/ dashboard.html
          git diff --staged --quiet || git commit -m "Crypto run $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
